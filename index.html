<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بيانات الطالب - UST</title>
    <style>
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background-color: #f0f2f5;
            margin: 0;
            display: flex;
            justify-content: center;
            padding-top: 20px;
        }
        .container {
            width: 95%;
            max-width: 450px;
            background: white;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        .header {
            background-color: #2e3192;
            color: white;
            padding: 20px;
            text-align: center;
            font-size: 1.2em;
            font-weight: bold;
        }
        .status-box {
            background-color: #d4edda;
            color: #155724;
            padding: 15px;
            margin: 15px;
            border-radius: 8px;
            text-align: center;
            font-size: 1.3em;
            font-weight: bold;
            border: 1px solid #c3e6cb;
        }
        .info-section {
            padding: 20px;
        }
        .info-row {
            display: flex;
            justify-content: space-between;
            padding: 12px 0;
            border-bottom: 1px solid #eee;
        }
        .info-label {
            color: #666;
            font-weight: bold;
        }
        .info-value {
            color: #333;
            text-align: left;
            word-break: break-all;
        }
        .footer {
            text-align: center;
            padding: 15px;
            font-size: 0.8em;
            color: #888;
            background: #fafafa;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">نظام التحقق من القيد الدراسي - UST</div>
        
        <div class="status-box">
            ✅ مسموح بالدخول
        </div>

        <div class="info-section">
            <div class="info-row">
                <span class="info-label">اسم الطالب:</span>
                <span class="info-value">Hazim Ibrahim</span>
            </div>
            <div class="info-row">
                <span class="info-label">الرقم الجامعي:</span>
                <span class="info-value">2019ENARB0037</span>
            </div>
            <div class="info-row">
                <span class="info-label">البرنامج:</span>
                <span class="info-value">Architecture and spatial planning</span>
            </div>
            <div class="info-row">
                <span class="info-label">المستوى:</span>
                <span class="info-value">Five (الخامس)</span>
            </div>
            <div class="info-row">
                <span class="info-label">الدفعة:</span>
                <span class="info-value">AB/0019/2019/ENAR</span>
            </div>
            <div class="info-row">
                <span class="info-label">آخر تسجيل:</span>
                <span class="info-value">2025-06-29</span>
            </div>
        </div>

        <div class="footer">
            جميع الحقوق محفوظة © جامعة العلوم والتقانة - مركز التقانة
        </div>
    </div>
</body>
</html>
